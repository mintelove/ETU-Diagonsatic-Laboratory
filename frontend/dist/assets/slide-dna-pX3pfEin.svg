<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#030a16"/>
      <stop offset="50%" stop-color="#08182d"/>
      <stop offset="100%" stop-color="#020710"/>
    </linearGradient>
    <linearGradient id="dnaGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d2ff"/>
      <stop offset="50%" stop-color="#0089ff"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <linearGradient id="dnaGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38ef7d"/>
      <stop offset="50%" stop-color="#11998e"/>
      <stop offset="100%" stop-color="#00e676"/>
    </linearGradient>
    <radialGradient id="glowGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d2ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00d2ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blurFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Deep Lab Background -->
  <rect width="1920" height="1080" fill="url(#bgGrad)"/>
  
  <!-- Subtle Grid Lines -->
  <g opacity="0.12" stroke="#00d2ff" stroke-width="1">
    <path d="M0 180 H1920 M0 360 H1920 M0 540 H1920 M0 720 H1920 M0 900 H1920"/>
    <path d="M320 0 V1080 M640 0 V1080 M960 0 V1080 M1280 0 V1080 M1600 0 V1080"/>
  </g>

  <!-- Ambient Glow Orbs -->
  <circle cx="960" cy="540" r="500" fill="url(#glowGlow)"/>
  <circle cx="1400" cy="300" r="350" fill="#0089ff" opacity="0.15" filter="url(#blurFilter)"/>

  <!-- Lab Equipment Silhouette Overlay -->
  <g opacity="0.25" fill="#0b243b">
    <rect x="150" y="650" width="300" height="430" rx="20"/>
    <rect x="200" y="580" width="80" height="70" rx="10"/>
    <rect x="1500" y="600" width="350" height="480" rx="30"/>
  </g>

  <!-- Stylized DNA Double Helix Structure -->
  <g filter="url(#glowFilter)">
    <!-- Strand 1 Sine-like Path -->
    <path d="M 400 540 C 520 300, 680 300, 800 540 C 920 780, 1080 780, 1200 540 C 1320 300, 1480 300, 1600 540" fill="none" stroke="url(#dnaGrad1)" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Strand 2 Sine-like Path (Phase Shifted) -->
    <path d="M 400 540 C 520 780, 680 780, 800 540 C 920 300, 1080 300, 1200 540 C 1320 780, 1480 780, 1600 540" fill="none" stroke="url(#dnaGrad2)" stroke-width="8" stroke-linecap="round"/>

    <!-- Connecting Base Pairs -->
    <g stroke="#ffffff" stroke-width="3" opacity="0.75">
      <line x1="460" y1="420" x2="460" y2="660"/>
      <line x1="520" y1="335" x2="520" y2="745"/>
      <line x1="600" y1="320" x2="600" y2="760"/>
      <line x1="680" y1="360" x2="680" y2="720"/>
      <line x1="740" y1="450" x2="740" y2="630"/>
      
      <line x1="860" y1="630" x2="860" y2="450"/>
      <line x1="920" y1="720" x2="920" y2="360"/>
      <line x1="1000" y1="760" x2="1000" y2="320"/>
      <line x1="1080" y1="745" x2="1080" y2="335"/>
      <line x1="1140" y1="660" x2="1140" y2="420"/>

      <line x1="1260" y1="420" x2="1260" y2="660"/>
      <line x1="1320" y1="335" x2="1320" y2="745"/>
      <line x1="1400" y1="320" x2="1400" y2="760"/>
      <line x1="1480" y1="360" x2="1480" y2="720"/>
      <line x1="1540" y1="450" x2="1540" y2="630"/>
    </g>

    <!-- Base Pair Nucleotide Nodes -->
    <g fill="#00f2fe">
      <circle cx="460" cy="420" r="10"/><circle cx="460" cy="660" r="10" fill="#38ef7d"/>
      <circle cx="520" cy="335" r="12"/><circle cx="520" cy="745" r="12" fill="#38ef7d"/>
      <circle cx="600" cy="320" r="14"/><circle cx="600" cy="760" r="14" fill="#38ef7d"/>
      <circle cx="680" cy="360" r="12"/><circle cx="680" cy="720" r="12" fill="#38ef7d"/>
      <circle cx="740" cy="450" r="10"/><circle cx="740" cy="630" r="10" fill="#38ef7d"/>

      <circle cx="860" cy="450" r="10" fill="#38ef7d"/><circle cx="860" cy="630" r="10"/>
      <circle cx="920" cy="360" r="12" fill="#38ef7d"/><circle cx="920" cy="720" r="12"/>
      <circle cx="1000" cy="320" r="14" fill="#38ef7d"/><circle cx="1000" cy="760" r="14"/>
      <circle cx="1080" cy="335" r="12" fill="#38ef7d"/><circle cx="1080" cy="745" r="12"/>
      <circle cx="1140" cy="420" r="10" fill="#38ef7d"/><circle cx="1140" cy="660" r="10"/>
    </g>
  </g>

  <!-- Foreground Lab UI overlay elements -->
  <g fill="#ffffff" opacity="0.85">
    <text x="120" y="140" font-family="DM Sans, sans-serif" font-size="28" font-weight="700" fill="#00d2ff" letter-spacing="4">MOLECULAR DIAGNOSTICS &amp; DNA ANALYSIS</text>
    <text x="120" y="180" font-family="DM Sans, sans-serif" font-size="16" fill="#a0c4df">GENOMIC SEQUENCING · PCR AMPLIFICATION · ETU DIAGNOSTIC LABORATORY</text>
  </g>
</svg>
